name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [identity-provider, mcp-server, mcp-client]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.32"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run --with ruff ruff check .

      - name: Run tests
        run: uv run pytest -v --cov=main --cov-report=term-missing

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-client
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.32"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run e2e tests
        run: uv run pytest -m e2e -v

  audit:
    name: Audit ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [identity-provider, mcp-server, mcp-client]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.32"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run pip-audit
        run: |
          uv export --no-dev --format requirements-txt > /tmp/reqs.txt
          # PYSEC-2026-1325 (ecdsa, transitive via python-jose) has no fixed
          # release; upstream treats side-channel attacks as out of scope.
          # This demo only uses RS256 (RSA), so the ecdsa code path is never
          # exercised. Revisit if python-jose swaps or drops the dependency.
          uv run --with pip-audit pip-audit -r /tmp/reqs.txt \
            --ignore-vuln PYSEC-2026-1325

  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24.1.0
        with:
          globs: '**/*.md'
