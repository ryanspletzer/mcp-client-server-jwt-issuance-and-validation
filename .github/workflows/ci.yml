name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [identity-provider, mcp-server, mcp-client]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run --with ruff ruff check .

      - name: Run tests
        run: uv run pytest -v --cov=main --cov-report=term-missing

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-client
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run e2e tests
        run: uv run pytest -m e2e -v

  audit:
    name: Audit ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [identity-provider, mcp-server, mcp-client]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run pip-audit
        run: |
          uv export --no-dev --format requirements-txt > /tmp/reqs.txt
          uv run --with pip-audit pip-audit -r /tmp/reqs.txt

  markdownlint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
